<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에으 암호기</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:"Pretendard","Segoe UI",sans-serif;
background:
radial-gradient(circle at top left,#38bdf8,transparent 30%),
radial-gradient(circle at bottom right,#a78bfa,transparent 30%),
#020617;
color:white;
}
.container{
width:min(850px,92%);
padding:35px;
border-radius:32px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(25px);
box-shadow:0 30px 80px rgba(0,0,0,.45);
}
.header{text-align:center;margin-bottom:30px}
.logo{font-size:64px}
h1{margin:0;font-size:36px}
.subtitle{margin-top:8px;color:#cbd5e1}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:rgba(0,0,0,.25);padding:20px;border-radius:24px}
textarea{
width:100%;height:220px;resize:none;border:none;outline:none;
border-radius:18px;padding:18px;background:#020617;color:white;font-size:16px
}
.buttons{display:flex;gap:12px;margin-top:25px}
button{
flex:1;border:none;border-radius:18px;padding:16px;cursor:pointer;font-weight:bold
}
.encode{background:#38bdf8}
.decode{background:#a78bfa}
.copy{background:#34d399}
.clear{background:#fb7185}
.status{height:22px;text-align:center;margin-top:20px;color:#cbd5e1}
@media(max-width:700px){.grid{grid-template-columns:1fr}.buttons{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="container">
<div class="header">
<div class="logo">에으</div>
<h1>에으 암호기</h1>
<div class="subtitle">Base64 기반 에으 변환</div>
</div>

<div class="grid">
<div class="panel">
<textarea id="input" placeholder="입력"></textarea>
</div>
<div class="panel">
<textarea id="output" readonly placeholder="결과"></textarea>
</div>
</div>

<div class="buttons">
<button class="encode" onclick="encode()">암호화</button>
<button class="decode" onclick="decode()">복호화</button>
<button class="copy" onclick="copyResult()">복사</button>
<button class="clear" onclick="clearAll()">초기화</button>
</div>

<div id="status" class="status"></div>
</div>

<script>
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";
const patterns=[];

for(let len=1;patterns.length<chars.length;len++){
function dfs(s){
if(patterns.length>=chars.length)return;
if(s.length===len){patterns.push(s);return;}
dfs(".");
dfs("-");
}
dfs("");
}

const morse={};
const reverse={};

for(let i=0;i<chars.length;i++){
morse[chars[i]]=patterns[i];
reverse[patterns[i]]=chars[i];
}

function encodeBase64(str){
let bytes=new TextEncoder().encode(str);
let binary="";
for(const b of bytes) binary+=String.fromCharCode(b);
return btoa(binary);
}

function decodeBase64(str){
let binary=atob(str);
let bytes=Uint8Array.from(binary,c=>c.charCodeAt(0));
return new TextDecoder().decode(bytes);
}

function encode(){
try{
let b64=encodeBase64(input.value);
output.value=[...b64].map(c=>
morse[c].replaceAll(".","에").replaceAll("-","으")
).join(" ");
setStatus("암호화 완료");
}catch{
output.value="암호화 실패";
}
}

function decode(){
try{
let b64=input.value.trim().split(/\s+/)
.map(x=>x.replaceAll("에",".").replaceAll("으","-"))
.map(x=>reverse[x]).join("");

output.value=decodeBase64(b64);
setStatus("복호화 완료");
}catch{
output.value="복호화 실패";
setStatus("입력 오류");
}
}

function copyResult(){
navigator.clipboard.writeText(output.value);
setStatus("복사 완료");
}

function clearAll(){
input.value="";
output.value="";
}

function setStatus(t){
status.textContent=t;
setTimeout(()=>status.textContent="",1500);
}
</script>

</body>
</html>
