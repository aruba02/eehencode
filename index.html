<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">


<title>으에?</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:"Noto Sans KR","Segoe UI",sans-serif;

background:
radial-gradient(circle at top left,#38bdf8,transparent 30%),
radial-gradient(circle at bottom right,#a78bfa,transparent 30%),
#020617;

color:white;

}


.container{

width:min(850px,92%);

padding:35px;

border-radius:32px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(25px);

box-shadow:0 30px 80px rgba(0,0,0,.45);

}


.header{

text-align:center;

margin-bottom:30px;

}


.logo{

font-size:64px;

font-weight:800;

letter-spacing:-2px;

}



h1{

margin:0;

font-size:36px;

font-weight:800;

letter-spacing:-1px;

}



.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}



.panel{

background:rgba(0,0,0,.25);

padding:20px;

border-radius:24px;

}



textarea{

width:100%;

height:220px;

resize:none;

border:none;

outline:none;

border-radius:18px;

padding:18px;

background:#020617;

color:white;

font-size:16px;

font-family:"Noto Sans KR","Segoe UI",sans-serif;

}



.buttons{

display:flex;

gap:12px;

margin-top:25px;

}



button{

flex:1;

border:none;

border-radius:18px;

padding:16px;

cursor:pointer;

font-weight:700;

font-family:"Noto Sans KR","Segoe UI",sans-serif;

}



.encode{
background:#38bdf8;
}


.decode{
background:#a78bfa;
}


.copy{
background:#34d399;
}


.clear{
background:#fb7185;
}



.status{

height:22px;

text-align:center;

margin-top:20px;

color:#cbd5e1;

}



@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}


.buttons{
flex-wrap:wrap;
}

}

</style>

</head>



<body>


<div class="container">


<div class="header">


<div class="logo">
으에?
</div>


<h1>
으에?
</h1>


</div>



<div class="grid">


<div class="panel">

<textarea id="input" placeholder="입력"></textarea>

</div>



<div class="panel">

<textarea id="output" readonly placeholder="결과"></textarea>

</div>


</div>



<div class="buttons">


<button class="encode" onclick="encodeText()">
암호화
</button>


<button class="decode" onclick="decodeText()">
복호화
</button>


<button class="copy" onclick="copyText()">
복사
</button>


<button class="clear" onclick="clearText()">
초기화
</button>


</div>



<div id="status"></div>



</div>





<script>


const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";



const codes=[];


function makeCodes(){


for(let i=1; codes.length<chars.length; i++){


let limit=1<<i;


for(let j=0;j<limit && codes.length<chars.length;j++){


let s="";


for(let k=i-1;k>=0;k--){

s += (j&(1<<k)) ? "-" : ".";

}


codes.push(s);


}

}


}


makeCodes();



const enc={};
const dec={};



for(let i=0;i<chars.length;i++){

enc[chars[i]]=codes[i];

dec[codes[i]]=chars[i];

}




function toBase64(str){

return btoa(
unescape(
encodeURIComponent(str)
)
);

}



function fromBase64(str){

return decodeURIComponent(
escape(
atob(str)
)
);

}




function encodeText(){


try{


let b64=toBase64(input.value);


output.value =
[...b64]
.map(c=>

enc[c]
.replace(/\./g,"에")
.replace(/-/g,"으")

)
.join(" ");



setStatus("암호화 완료");


}catch(e){

output.value="암호화 실패";

}


}





function decodeText(){


try{


let b64 =
input.value
.trim()
.split(/\s+/)
.map(x=>

x.replace(/에/g,".")
.replace(/으/g,"-")

)
.map(x=>dec[x])
.join("");



output.value =
fromBase64(b64);



setStatus("복호화 완료");


}catch(e){

output.value="복호화 실패";

}


}




function copyText(){

navigator.clipboard.writeText(output.value);

setStatus("복사 완료");

}




function clearText(){

input.value="";
output.value="";

}





function setStatus(t){

status.textContent=t;


setTimeout(
()=>{
status.textContent="";
},
1500
);

}


</script>


</body>

</html>
